<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - BillFlow</title>
    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Local Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body style="margin: 0; padding: 0;">
    <div class="auth-container">
        <div class="auth-card" style="text-align: center; padding: 40px 32px;">
            <div class="auth-logo" style="margin-bottom: 24px;">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="BillFlow Logo" style="height: 40px; width: auto;">
            </div>
            <h2 style="font-size: 20px; font-weight: 700; margin-bottom: 12px; color: #0f172a;">Password Reset</h2>
            <p style="font-size: 14px; color: #64748b; margin-bottom: 32px; line-height: 1.6;">
                Password reset functionality will be available in a future update.
            </p>
            <a href="{{ url_for('login') }}" class="btn btn-primary" style="display: inline-flex; align-items: center; justify-content: center; width: 100%; height: 44px; font-weight: 600; text-decoration: none; border-radius: 6px; box-sizing: border-box;">
                Back to Login
            </a>
        </div>
    </div>
</body>
</html>
